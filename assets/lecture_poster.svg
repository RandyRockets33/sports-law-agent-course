<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101f"/>
      <stop offset="100%" stop-color="#14213c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#324468" stroke-opacity="0.15" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <ellipse cx="800" cy="450" rx="700" ry="400" fill="url(#glow)"/>
  <g transform="translate(800,420)" text-anchor="middle">
    <text fill="#d4af37" font-family="Fraunces, Georgia, serif" font-size="74" font-weight="600" letter-spacing="-0.01em">Sports Agent Academy</text>
    <text y="80" fill="#9aa6c2" font-family="Inter, Arial, sans-serif" font-size="28" letter-spacing="0.15em">CERTIFICATION COURSE · LECTURE</text>
  </g>
  <g transform="translate(800,600)">
    <circle r="56" fill="#d4af37" cx="0" cy="0"/>
    <polygon points="-18,-28 -18,28 28,0" fill="#07101f"/>
  </g>
</svg>
